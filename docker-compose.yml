version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: library-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  database:
    image: mysql:8.0
    container_name: library-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: librarydb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/library-bucket || true;
      /usr/bin/mc anonymous set public myminio/library-bucket;
      exit 0;
      "

  backend:
    build: 
      context: ./code/backend-layered
    container_name: library-backend
    ports:
      - "8081:8081"
    depends_on:
      - database
      - minio
    environment:
      - DB_URL=jdbc:mysql://database:3306/librarydb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - JWT_SECRET=bGlicmFyeS1tYW5hZ2VtZW50LXN5c3RlbS1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI2
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=library-bucket
      - BACKEND_URL=${BACKEND_URL:-https://lms-backend-345298684510.europe-west1.run.app}
      - FRONTEND_URL=${FRONTEND_URL:-https://library-management-lovat-theta.vercel.app}
      - CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS:-https://library-management-lovat-theta.vercel.app,https://*.vercel.app}
      - VNPAY_TMN_CODE=TEQESQV7
      - VNPAY_HASH_SECRET=U42B64F0N9J3ZGME1XCPUDDPIQXPR6IT
      - VNPAY_PAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:-https://lms-backend-345298684510.europe-west1.run.app/api/vnpay/return}
      - VNPAY_IPN_URL=${VNPAY_IPN_URL:-https://lms-backend-345298684510.europe-west1.run.app/api/vnpay/ipn}
      - RESEND_API_KEY=re_7vd8p2xY_VAntP8pnzRgWvw63bpFSme58
      - RESEND_FROM_EMAIL=Thư viện Lumina <onboarding@resend.dev>
      - RECAPTCHA_SECRET_KEY=6Lf9e0gtAAAAABHebiEQ0Vd-_OxPoBG8aIKPo1N5

  frontend:
    build:
      context: ./code/Next-frontend
    container_name: library-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - BACKEND_URL=${BACKEND_URL:-https://lms-backend-345298684510.europe-west1.run.app}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8081}

volumes:
  redis_data:
  minio_data:
  db_data:
