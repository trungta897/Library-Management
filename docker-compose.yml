version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: library-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  database:
    image: mysql:8.0
    container_name: library-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in your local environment}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-librarydb}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in your local environment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your local environment}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb myminio/$${MINIO_BUCKET_NAME} || true;
      /usr/bin/mc anonymous set public myminio/$${MINIO_BUCKET_NAME};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in your local environment}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your local environment}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-library-bucket}

  backend:
    build: 
      context: ./code/backend-layered
    container_name: library-backend
    ports:
      - "8081:8081"
    depends_on:
      - database
      - minio
    environment:
      - DB_URL=jdbc:mysql://database:3306/librarydb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in your local environment}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in your local environment}
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in your local environment}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in your local environment}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-library-bucket}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL in your local environment}
      - FRONTEND_URL=${FRONTEND_URL:?Set FRONTEND_URL in your local environment}
      - CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS:?Set CORS_ALLOWED_ORIGIN_PATTERNS in your local environment}
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE:?Set VNPAY_TMN_CODE in your local environment}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET:?Set VNPAY_HASH_SECRET in your local environment}
      - VNPAY_PAY_URL=${VNPAY_PAY_URL:?Set VNPAY_PAY_URL in your local environment}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL:?Set VNPAY_RETURN_URL in your local environment}
      - VNPAY_IPN_URL=${VNPAY_IPN_URL:?Set VNPAY_IPN_URL in your local environment}
      - RESEND_API_KEY=${RESEND_API_KEY:?Set RESEND_API_KEY in your local environment}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:?Set RESEND_FROM_EMAIL in your local environment}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:?Set RECAPTCHA_SECRET_KEY in your local environment}

  frontend:
    build:
      context: ./code/Next-frontend
    container_name: library-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - BACKEND_URL=${BACKEND_URL:?Set BACKEND_URL in your local environment}
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:8081}

volumes:
  redis_data:
  minio_data:
  db_data:
