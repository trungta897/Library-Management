version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: library-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: librarydb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: replace-with-local-minio-credential
      MINIO_ROOT_PASSWORD: replace-with-local-minio-credential
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  create-bucket:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 replace-with-local-minio-credential replace-with-local-minio-credential;
      /usr/bin/mc mb myminio/library-bucket || true;
      /usr/bin/mc anonymous set public myminio/library-bucket;
      exit 0;
      "

  backend:
    build: 
      context: ./code/backend-layered
    container_name: library-backend
    ports:
      - "8081:8081"
    depends_on:
      - database
      - minio
    environment:
      - DB_URL=jdbc:mysql://database:3306/librarydb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - JWT_SECRET=replace-with-base64-jwt-secret
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=replace-with-local-minio-credential
      - MINIO_SECRET_KEY=replace-with-local-minio-credential
      - MINIO_BUCKET_NAME=library-bucket
      - FRONTEND_URL=http://localhost:3000
      - VNPAY_TMN_CODE=replace-with-vnpay-tmn-code
      - VNPAY_HASH_SECRET=replace-with-vnpay-hash-secret
      - VNPAY_PAY_URL=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - VNPAY_RETURN_URL=http://localhost:8081/api/vnpay/return
      - VNPAY_IPN_URL=http://localhost:8081/api/vnpay/ipn
      - RESEND_API_KEY=replace-with-resend-api-key
      - RESEND_FROM_EMAIL=Thư viện Lumina <onboarding@resend.dev>
      - RECAPTCHA_SECRET_KEY=replace-with-recaptcha-secret-key

  frontend:
    build:
      context: ./code/Next-frontend
    container_name: library-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - BACKEND_INTERNAL_URL=http://backend:8081

volumes:
  minio_data:
  db_data:
