server:
  port: ${PORT:8081}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:.env.backend[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc.time_zone: Asia/Ho_Chi_Minh
        default_batch_fetch_size: 100
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    ignore-migration-patterns: "*:missing"
resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:Lumina Library <onboarding@resend.dev>}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 900000

vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: ${VNPAY_PAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  ipn-url: ${VNPAY_IPN_URL}
  frontend-url: ${FRONTEND_URL}
  version: "2.1.0"
  command: "pay"
  order-type: "other"

minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

recaptcha:
  secret-key: ${RECAPTCHA_SECRET_KEY}
