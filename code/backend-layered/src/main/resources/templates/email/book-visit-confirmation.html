<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận lịch đọc sách</title>
</head>
<body style="font-family: Inter, Arial, sans-serif; color: #191c1d; line-height: 1.6;">
    <h1 style="color: #15157d;">Lumina Library</h1>
    <p>Xin chào <span th:text="${fullName}"></span>,</p>
    <p>Lịch đọc sách tại thư viện của bạn đã được ghi nhận.</p>
    <table style="border-collapse: collapse; margin-top: 16px;">
        <tr>
            <td style="padding: 6px 12px; font-weight: 600;">Sách</td>
            <td style="padding: 6px 12px;" th:text="${bookTitle}"></td>
        </tr>
        <tr>
            <td style="padding: 6px 12px; font-weight: 600;">Mã xác nhận</td>
            <td style="padding: 6px 12px; font-weight: 700; color: #15157d;" th:text="${confirmationCode}"></td>
        </tr>
        <tr>
            <td style="padding: 6px 12px; font-weight: 600;">Ngày đến</td>
            <td style="padding: 6px 12px;" th:text="${visitDate}"></td>
        </tr>
        <tr>
            <td style="padding: 6px 12px; font-weight: 600;">Giờ đến</td>
            <td style="padding: 6px 12px;" th:text="${visitTime}"></td>
        </tr>
        <tr th:if="${phone != null and !phone.isEmpty()}">
            <td style="padding: 6px 12px; font-weight: 600;">Số điện thoại</td>
            <td style="padding: 6px 12px;" th:text="${phone}"></td>
        </tr>
    </table>
    <p style="margin-top: 20px;">Vui lòng mang theo email này khi đến quầy lễ tân.</p>
</body>
</html>
